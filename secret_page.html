<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私密工作台 - 云上笔记</title>

    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="baiduspider" content="noindex, nofollow">

    <link rel="stylesheet" href="secret_style.css">
    <script src="config.js" defer></script>
    <script src="supabase.js" defer></script>
    <script src="secret_script.js"></script>
</head>
<body>
    <div id="global-navbar" class="navbar-box"></div>
    </div>
    <div class="secret-container">
        <header class="secret-header">
            <div class="secret-header-top">
                <h2>🔒 私密工作空间</h2>
                <button id="backToHomeBtn" class="btn-nav"><a href="index.html">返回普通首页</a> 🏠</button>
            </div>
            <p class="security-tip">此页面仅对已登录用户开放，所有内容将通过 Supabase 保存。</p>
        </header>

        <main class="secret-content">
            <div id="authStatus" class="auth-box">
                <p>正在验证登录状态...</p>
            </div>

            <div id="workArea" class="work-area hidden">
                <div class="secret-layout">
                    <aside class="secret-sidebar">
                        <div class="secret-sidebar-top">
                            <h3>私密笔记</h3>
                        </div>
                        <div id="secretNotesList" class="secret-notes-list"></div>
                    </aside>

                    <section class="secret-editor-area">
                        <div id="secretEmptyState" class="secret-empty-state">
                            <div class="empty-state-card">
                                <p>当前还没有私密笔记。点击下面按钮创建你的第一条私密内容。</p>
                                <button id="newSecretNoteBtn" class="btn-primary">+ 新建私密笔记</button>
                            </div>
                        </div>

                        <div id="secretEditorArea" class="secret-editor hidden">
                            <input type="text" id="secretTitle" class="secret-title-input" placeholder="私密笔记标题">
                            <textarea id="secretNote" placeholder="在这里记录你的私密想法..."></textarea>
                            <div class="secret-actions">
                                <button id="saveBtn" class="btn-primary">保存</button>
                                <button id="deleteSecretBtn" class="btn-danger">删除</button>
                            </div>
                            <p id="statusMsg" class="status-message"></p>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>
<script src="config.js"></script>
<script src="supabase.js"></script>
<script src="common.js"></script>
<script src="secret_script.js"></script>

</body>
</html>
